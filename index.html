<!DOCTYPE html>
<html>
<head>
  <title>AI Madness League</title>
  <style>
    body {
      background: #0a0a0a;
      color: white;
      font-family: Arial;
      margin: 0;
    }

    .header {
      padding: 20px;
      text-align: center;
      font-size: 32px;
      font-weight: bold;
      border-bottom: 1px solid #222;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #111;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      border: 1px solid #222;
    }

    .match {
      display: flex;
      justify-content: space-between;
      font-size: 18px;
    }

    .vs {
      opacity: 0.5;
    }
  </style>
</head>

<body>

<div class="header">🏆 AI MADNESS LEAGUE</div>

<div class="container">

  <div class="card">
    <h2>Season 6 — Preseason</h2>
  </div>

  <div class="card">
    <div class="match">
      <span>DeepSeek</span>
      <span class="vs">VS</span>
      <span>Meta</span>
    </div>
  </div>

</div>

</body>
</html>
